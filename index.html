<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Qualhouse · Event Lead Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0a0a0a;--surface:#131313;--surface-2:#1a1a1a;--surface-3:#242424;--border:#2a2a2a;--text:#f5f5f5;--text-dim:#999;--text-muted:#555;--accent:#e28a32;--accent-glow:rgba(226,138,50,.12);--green:#4ade80;--green-dim:rgba(74,222,128,.1);--red:#ef4444;--orange:#e28a32;--radius:10px;--radius-sm:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV + TABS */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-brand img{height:30px}
.nav-right-top{display:flex;align-items:center;gap:8px}
.lang-btn{padding:5px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--accent);background:var(--accent-glow);border:1px solid rgba(226,138,50,.3)}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
.offline-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:6px 8px calc(6px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;gap:2px}
.nav-tab{padding:10px 4px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;cursor:pointer;color:var(--text-dim);background:0 0;border:none;transition:all .2s;white-space:nowrap;flex:1;text-align:center}
.nav-tab:hover{color:var(--text);background:var(--surface-2)}
.nav-tab.active{color:#fff;background:var(--accent)}
@media(min-width:769px){
.tab-bar{position:fixed;top:0;right:0;bottom:auto;left:auto;border-top:none;background:none;backdrop-filter:none;padding:0 120px 0 0;height:52px;align-items:center;justify-content:flex-end;gap:4px;width:auto}
.nav-tab{padding:7px 14px;font-size:12px;flex:none}
.nav-right-top{position:absolute;right:16px;top:50%;transform:translateY(-50%)}
}

/* VIEWS */
.view{display:none;padding:64px 16px 90px;max-width:960px;margin:0 auto}
@media(min-width:769px){.view{padding:64px 16px 40px}}
.view.active{display:block}
h1{font-size:24px;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--text-dim);font-size:13px;margin-bottom:20px}

/* CARDS & FORMS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:14px}
input[type=text],input[type=tel],input[type=email],input[type=password],input[type=file],select,textarea{width:100%;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;transition:border-color .2s;resize:vertical}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--accent)}
label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:4px}
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.15)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-success{background:var(--green);color:#000}
.btn-danger{background:var(--red);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-lg{padding:14px 28px;font-size:15px;border-radius:var(--radius)}
.row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:180px}

/* SETUP STEPS */
.step-indicators{display:flex;gap:8px;margin-bottom:20px}
.step-ind{flex:1;padding:10px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);transition:all .3s}
.step-ind.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.step-ind.done{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.stands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;margin-top:10px}
.stand-chip{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px}
.stand-chip .remove{width:18px;height:18px;border-radius:50%;background:var(--surface-3);border:none;color:var(--text-dim);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.stand-chip .remove:hover{background:var(--red);color:#fff}

/* SCANNER */
.scanner-container{display:flex;flex-direction:column;align-items:center;gap:16px;padding-top:12px}
.scanner-stand-select select{font-size:15px;padding:12px 16px;text-align:center;background:var(--accent-glow);border-color:var(--accent)}
#video-container{position:relative;width:100%;max-width:400px;aspect-ratio:1;border-radius:var(--radius);overflow:hidden;background:var(--surface);border:2px solid var(--border)}
#video-container video{width:100%;height:100%;object-fit:cover}
#video-container canvas{display:none}
.scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:200px;height:200px;border:2px solid rgba(226,138,50,.4);border-radius:16px;position:relative}
.scan-frame::before,.scan-frame::after{content:'';position:absolute;width:30px;height:30px;border-color:var(--accent);border-style:solid}
.scan-frame::before{top:-1px;left:-1px;border-width:3px 0 0 3px;border-radius:8px 0 0 0}
.scan-frame::after{top:-1px;right:-1px;border-width:3px 3px 0 0;border-radius:0 8px 0 0}
.scan-corners-bottom{position:absolute;bottom:0;left:0;right:0;height:30px}
.scan-corners-bottom::before,.scan-corners-bottom::after{content:'';position:absolute;width:30px;height:30px;border-color:var(--accent);border-style:solid}
.scan-corners-bottom::before{bottom:-1px;left:-1px;border-width:0 0 3px 3px;border-radius:0 0 0 8px}
.scan-corners-bottom::after{bottom:-1px;right:-1px;border-width:0 3px 3px 0;border-radius:0 0 8px 0}
.scan-line{position:absolute;top:20%;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanLine 2s ease-in-out infinite}
@keyframes scanLine{0%,100%{top:20%;opacity:.3}50%{top:75%;opacity:1}}
.scan-result{width:100%;max-width:400px;padding:14px;border-radius:var(--radius);text-align:center;font-weight:600;font-size:14px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.scan-result.success{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.scan-result.error{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.scan-result.duplicate{background:rgba(226,138,50,.1);color:var(--orange);border:1px solid rgba(226,138,50,.3)}
.scan-log{width:100%;max-width:400px}
.scan-log-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:4px;font-size:12px}
.scan-log-item .time{color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:10px}

/* COMMENT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:420px}
.modal h2{font-size:18px;margin-bottom:4px}
.modal .modal-sub{color:var(--text-dim);font-size:12px;margin-bottom:16px}
.quick-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.quick-tag{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);transition:all .2s}
.quick-tag.selected{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}

/* PIN SCREEN */


/* BADGES */
.badges-grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:460px;margin:0 auto}
.badge-card{background:#fff;color:#000;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px 16px;box-shadow:0 2px 8px rgba(0,0,0,.12);border:1px solid #eee;border-top:5px solid #e28a32;position:relative}
.badge-card .badge-left{padding:8px 0;display:flex;align-items:center;justify-content:center}
.badge-card .badge-right{display:flex;flex-direction:column;align-items:center;width:100%}
.badge-card .badge-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0;width:100%;justify-content:center}
.badge-card .badge-logo{height:22px}
.badge-card .badge-event{font-size:10px;color:#b0b0b0;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.badge-card .badge-name{font-size:20px;font-weight:800;color:#111;line-height:1.2;margin-bottom:4px}
.badge-card .badge-detail{font-size:11px;color:#666;line-height:1.6}
.badge-card .badge-company{font-size:13px;color:#e28a32;font-weight:700;margin-bottom:4px}
.badge-card .badge-id{font-family:'JetBrains Mono',monospace;font-size:9px;color:#ccc;margin-top:8px;letter-spacing:1px}
.badge-card .qr-container{padding:8px 0;background:#fff;line-height:0}
.badge-card .qr-img{width:130px;height:130px;display:block;margin:0 auto}
.badge-card .qr-container img,.badge-card .qr-container canvas{width:130px!important;height:130px!important}

@media print{
body{background:#fff!important;margin:0!important;padding:0!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
.nav,.tab-bar,.view:not(#badgesView){display:none!important}
#badgesView{display:block!important;padding:0!important;margin:0!important;max-width:none!important}
#badgesView>h1,#badgesView>p,#badgesView>.badge-actions,#badgesView>.subtitle{display:none!important}
.badges-grid{display:block!important;max-width:none!important}
.badges-grid>p{display:none!important}
.badge-card{border-radius:0!important;box-shadow:none!important;border:none!important;border-top:6px solid #e28a32!important;
  page-break-after:always!important;width:4in!important;height:6in!important;box-sizing:border-box!important;margin:0!important;
  display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;
  text-align:center!important;padding:8mm!important}
.badge-card .badge-right{align-items:center!important;text-align:center!important;width:100%!important;border:none!important;padding:2mm 0!important}
.badge-card .badge-left{padding:4mm 0!important}
.badge-card .badge-top{justify-content:center!important;margin-bottom:5mm!important;padding-bottom:4mm!important;border-bottom:1px solid #ddd!important}
.badge-card .badge-name{font-size:26pt!important;font-weight:800!important;margin-bottom:2mm!important}
.badge-card .badge-company{font-size:14pt!important;color:#e28a32!important;margin-bottom:2mm!important}
.badge-card .badge-detail{font-size:11pt!important;color:#333!important}
.badge-card .badge-logo{height:10mm!important}
.badge-card .badge-event{font-size:10pt!important}
.badge-card .badge-id{font-size:9pt!important;color:#aaa!important;margin-top:4mm!important}
.badge-card .qr-container img,.badge-card .qr-container canvas{width:32mm!important;height:32mm!important}
}
@page{size:4in 6in;margin:0}
@media(max-width:768px){h1{font-size:20px}.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- MAIN APP (hidden until authenticated) -->
<div id="mainApp">
<nav class="nav">
  <div class="nav-brand"><img id="navLogo" alt="Qualhouse"></div>
  <div class="nav-right-top">
    <span id="syncIndicator" title="Firebase"><span class="online-dot"></span></span>
    <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
  </div>
</nav>
<div class="tab-bar" id="tabBar">
  <button class="nav-tab active" onclick="showView('setup')" data-i18n-tab="setup"></button>
  <button class="nav-tab" onclick="showView('checkin')" data-i18n-tab="checkin"></button>
  <button class="nav-tab" onclick="showView('scanner')" data-i18n-tab="scanner"></button>
  <button class="nav-tab" onclick="showView('badges')" data-i18n-tab="badges"></button>
  <button class="nav-tab" onclick="showView('dashboard')" data-i18n-tab="dashboard"></button>
</div>

<!-- SETUP -->
<div id="setupView" class="view active">
  <h1 data-i18n="setup_title"></h1>
  <p class="subtitle" data-i18n="setup_sub"></p>
  <div class="step-indicators">
    <div class="step-ind active" id="step1" data-i18n="step1"></div>
    <div class="step-ind" id="step2" data-i18n="step2"></div>
    <div class="step-ind" id="step3" data-i18n="step3"></div>
    <div class="step-ind" id="step4" data-i18n="step4"></div>
  </div>

  <!-- Step 1: Firebase + Event -->
  <div class="card" id="setup-step1">
    <div class="card-title" data-i18n="firebase_config"></div>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px" data-i18n="firebase_desc"></p>
    <div style="margin-bottom:10px"><label>Firebase Config (JSON)</label><textarea id="firebaseConfig" rows="4" placeholder='{"apiKey":"...","authDomain":"...","projectId":"..."}'></textarea></div>
    <div class="row" style="margin-bottom:10px">
      <div><label data-i18n="event_name"></label><input type="text" id="eventName" data-i18n-ph="event_name_ph"></div>
      <div><label data-i18n="event_date"></label><input type="text" id="eventDate" data-i18n-ph="event_date_ph"></div>
    </div>
    
    <div style="margin-bottom:10px"><label>Google Sheets URL <span style="color:var(--text-muted)">(backup, opcional)</span></label><input type="text" id="sheetUrl" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <button class="btn btn-primary" onclick="completeStep1()" data-i18n="continue"></button>
    <div id="firebaseStatus" style="margin-top:10px;font-size:12px"></div>
  </div>

  <!-- Step 2: CSV -->
  <div class="card hidden" id="setup-step2">
    <div class="card-title" data-i18n="import_attendees"></div>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px" data-i18n="import_desc"></p>
    <input type="file" id="csvFile" accept=".csv,.xlsx,.xls" onchange="handleCSV(event)" style="margin-bottom:10px">
    <div id="csvPreview" class="hidden"><p style="font-size:12px;color:var(--green);margin-bottom:6px" id="csvCount"></p><div style="max-height:180px;overflow:auto;border:1px solid var(--border);border-radius:var(--radius-sm)"><table class="data-table" id="csvPreviewTable"></table></div></div>
    <div style="margin-top:14px"><button class="btn btn-primary" id="step2Btn" onclick="completeStep2()" disabled data-i18n="continue"></button></div>
  </div>

  <!-- Step 3: Stands -->
  <div class="card hidden" id="setup-step3">
    <div class="card-title" data-i18n="supplier_stands"></div>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px" data-i18n="stands_desc"></p>
    <div style="display:flex;gap:6px"><input type="text" id="newStand" data-i18n-ph="stand_name_ph"><button class="btn btn-primary" onclick="addStand()" data-i18n="add"></button></div>
    <div class="stands-grid" id="standsGrid"></div>
    <div style="margin-top:14px"><button class="btn btn-primary" id="step3Btn" onclick="completeStep3()" disabled data-i18n="finish_setup"></button></div>
  </div>

  <!-- Step 4: Ready -->
  <div class="card hidden" id="setup-step4">
    <div class="card-title">🎉 <span data-i18n="setup_complete"></span></div>
    <div id="setupSummary" style="font-size:13px;line-height:2"></div>
    <div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="showView('badges')" data-i18n="print_badges"></button>
      <button class="btn btn-success" onclick="showView('scanner')" data-i18n="open_scanner"></button>
      <button class="btn btn-secondary" onclick="generateSupplierLink()" data-i18n="share_supplier_link"></button>
    </div>
    <div id="supplierLinkResult" class="hidden" style="margin-top:12px">
      <div class="config-section" style="margin-bottom:0">
        <label data-i18n="supplier_link_label"></label>
        <input type="text" id="supplierLinkUrl" readonly onclick="this.select()" style="margin-top:4px;font-size:11px">
        <p style="font-size:11px;color:var(--text-dim);margin-top:8px" data-i18n="supplier_link_desc"></p>
      </div>
    </div>
  </div>
</div>

<!-- CHECK-IN -->
<div id="checkinView" class="view">
  <div class="scanner-container">
    <h1 style="text-align:center" data-i18n="walkin_title"></h1>
    <p class="subtitle" style="text-align:center" data-i18n="walkin_sub"></p>

    <!-- Walk-in form FIRST -->
    <div class="card" style="width:100%;max-width:420px">
      <div class="card-title" data-i18n="new_walkin"></div>
      <div style="margin-bottom:10px"><label data-i18n="full_name"></label><input type="text" id="walkinName"></div>
      <div style="margin-bottom:10px"><label data-i18n="phone"></label><input type="tel" id="walkinPhone"></div>
      <div style="margin-bottom:10px"><label>Email *</label><input type="email" id="walkinEmail"></div>
      <div style="margin-bottom:14px"><label data-i18n="company_optional"></label><input type="text" id="walkinCompany"></div>
      <button class="btn btn-success btn-lg" style="width:100%" onclick="registerWalkin()" data-i18n="register_badge"></button>
    </div>
    <div id="walkinBadgeResult" class="hidden" style="width:100%;max-width:420px">
      <div class="card" style="background:var(--green-dim);border-color:rgba(74,222,128,.3)">
        <div style="text-align:center;margin-bottom:10px;color:var(--green);font-weight:600" data-i18n="registered_ok"></div>
        <div class="badge-card" id="walkinBadgeCard" style="margin:0 auto;max-width:280px"></div>
        <div style="text-align:center;margin-top:14px;display:flex;gap:6px;justify-content:center">
          <button class="btn btn-primary" onclick="printSingleBadge()" data-i18n="print_badge"></button>
          <button class="btn btn-secondary" onclick="closeWalkinResult()" data-i18n="register_another"></button>
        </div>
      </div>
    </div>

    <!-- Pending guests BELOW with search -->
    <div class="card" style="width:100%;max-width:480px;margin-top:8px" id="pendingGuestsCard">
      <div class="card-title">⏳ <span data-i18n="pending_guests"></span> <span id="pendingCount" style="color:var(--orange)"></span></div>
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:10px" data-i18n="pending_guests_desc"></p>
      <input type="text" id="pendingSearch" oninput="renderPendingGuests()" style="margin-bottom:10px;font-size:13px" data-i18n-ph="search_guest_ph">
      <div id="pendingGuestsList" style="max-height:300px;overflow-y:auto"></div>
    </div>
  </div>
</div>

<!-- SCANNER -->
<div id="scannerView" class="view">
  <div class="scanner-container">
    <h1 style="text-align:center" data-i18n="scan_title"></h1>
    <div class="scanner-stand-select" style="width:100%;max-width:400px;text-align:center">
      <label data-i18n="your_stand"></label>
      <select id="scannerStandSelect" onchange="saveSelectedStand()" style="font-size:15px;padding:12px 16px;text-align:center;background:var(--accent-glow);border-color:var(--accent)"><option value="" data-i18n="select_stand"></option></select>
    </div>
    <div id="video-container">
      <video id="video" autoplay playsinline></video><canvas id="canvas"></canvas>
      <div class="scanner-overlay"><div class="scan-frame"><div class="scan-corners-bottom"></div><div class="scan-line"></div></div></div>
    </div>
    <div id="scanResult"></div>
    <div style="width:100%;max-width:400px">
      <button class="btn btn-secondary" style="width:100%" onclick="toggleManualEntry()" data-i18n="no_badge_manual"></button>
      <div id="manualEntryForm" class="hidden" style="margin-top:10px">
        <div class="card" style="padding:14px">
          <div style="margin-bottom:8px"><label data-i18n="full_name"></label><input type="text" id="manualName"></div>
          <div style="margin-bottom:8px"><label data-i18n="phone"></label><input type="tel" id="manualPhone"></div>

let curLang=localStorage.getItem('lang')||'pt';
function t(k){return LANG[curLang][k]||LANG.en[k]||k}
function toggleLang(){curLang=curLang==='pt'?'en':'pt';localStorage.setItem('lang',curLang);applyLang();}
function applyLang(){
  document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=curLang==='pt'?'EN':'PT');
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>el.placeholder=t(el.getAttribute('data-i18n-ph')));
  document.querySelectorAll('[data-i18n-tab]').forEach(el=>el.textContent=t(el.dataset.i18nTab));
}
function titleCase(str){
  if(!str)return'';
  return str.toLowerCase().replace(/(?:^|\s|[-'])\S/g,function(a){return a.toUpperCase();});
}

let db=null, eventId=null, eventData=null;
let attendees=[], scans=[], stands=[];
let isAdmin=false;
let unsubAttendees=null, unsubScans=null;

function initFirebase(config){
  try{
    if(!firebase.apps.length) firebase.initializeApp(config);
    else firebase.app();
    db=firebase.firestore();
    return true;
  }catch(e){console.error('Firebase init error:',e);return false;}
}

async function loadEvent(eid){
  const doc=await db.collection('events').doc(eid).get();
  if(doc.exists){eventData=doc.data();eventId=eid;stands=eventData.stands||[];return true;}
  return false;
}

async function createEvent(name,date,standsArr,sheetUrl,firebaseConfig){
  eventId=name.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,20)+'_'+Date.now().toString(36);
  eventData={name,date,stands:standsArr,sheetUrl:sheetUrl||'',firebaseConfig,createdAt:new Date().toISOString()};

  stands=standsArr;
  localStorage.setItem('qh_eventId',eventId);
  localStorage.setItem('qh_firebaseConfig',JSON.stringify(firebaseConfig));
  return eventId;
}

      const fixed=configText.replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":').replace(/,\s*}/g,'}');
      config=JSON.parse(fixed);
    }catch(e2){document.getElementById('firebaseStatus').innerHTML='<span style="color:var(--red)">JSON inválido — verifique o formato</span>';return;}

let csvAttendees=[];
function handleCSV(e){
  const file=e.target.files[0];if(!file)return;
  const isXlsx=file.name.toLowerCase().match(/\.xlsx?$/);
  const r=new FileReader();
  r.onload=function(ev){
    let rows;
    if(isXlsx){
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    }else{
      rows=parseCSV(ev.target.result);
    }
    if(rows.length<2)return;
    const h=rows[0].map(x=>String(x).toLowerCase().trim());
    // Support both English (Eventbrite EN) and Portuguese (Eventbrite PT) column names
    const fi=h.findIndex(x=>x.includes('first name')||x==='first'||x.includes('nome do participante')||x==='nome');
    const li=h.findIndex(x=>x.includes('last name')||x==='last'||x.includes('sobrenome do participante')||x==='sobrenome'||x==='apelido');
    const ni=h.findIndex(x=>x==='name'||x.includes('attendee name'));
    const ei=h.findIndex(x=>x.includes('email')||x.includes('e-mail do participante')||x.includes('e-mail'));
    const pi=h.findIndex(x=>x.includes('phone')||x.includes('telefone')||x.includes('telemóvel')||x.includes('número de telefone'));
    const ci=h.findIndex(x=>x.includes('company')||x.includes('empresa')||x.includes('organization')||x.includes('organização'));
    const seen={};
    csvAttendees=[];
    let pendingCount=0;
    for(let i=1;i<rows.length;i++){
      const r2=rows[i];if(!r2||r2.length<2)continue;
      let name='';
      if(ni>=0)name=String(r2[ni]||'');
      else if(fi>=0&&li>=0)name=(String(r2[fi]||'')+' '+String(r2[li]||'')).trim();
      else if(fi>=0)name=String(r2[fi]||'');
      const email=ei>=0?String(r2[ei]||'').trim().toLowerCase():'';
      let phone=pi>=0?String(r2[pi]||'').trim():'';
      if(phone==='nan'||phone==='NaN')phone='';
      if(phone.match(/^\d+\.0$/))phone=phone.replace('.0','');
      const company=ci>=0?String(r2[ci]||'').trim():'';
      if(!name&&!email)continue;
      // Duplicate email = extra ticket (companion/guest)
      if(email&&seen[email]){
        seen[email]++;
        pendingCount++;
        const guestNum=seen[email];
        csvAttendees.push({
          id:'A'+String(csvAttendees.length+1).padStart(4,'0'),
          name:'',email:'',phone:'',company:'',
          pending:true,
          boughtBy:name.trim(),
          boughtByEmail:email,
          guestNum:guestNum
        });
        continue;
      }
      if(email)seen[email]=1;
      csvAttendees.push({id:'A'+String(csvAttendees.length+1).padStart(4,'0'),name:titleCase(name.trim()),email:email,phone:phone,company:titleCase(company)});
    }
    let statusHtml='✓ '+csvAttendees.length+' registos';
    if(pendingCount>0) statusHtml+=' <span style="color:var(--orange)">('+pendingCount+' acompanhantes por identificar)</span>';
    document.getElementById('csvCount').innerHTML=statusHtml;
    const tbl=document.getElementById('csvPreviewTable');
    let html='<thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Tel</th><th>Estado</th></tr></thead><tbody>';
    csvAttendees.slice(0,8).forEach(a=>{
      if(a.pending){
        html+='<tr style="color:var(--orange)"><td class="mono">'+a.id+'</td><td>👤 Acompanhante de '+a.boughtBy+'</td><td>—</td><td>—</td><td>⏳ Pendente</td></tr>';
      }else{
        html+='<tr><td class="mono">'+a.id+'</td><td>'+a.name+'</td><td>'+a.email+'</td><td>'+a.phone+'</td><td style="color:var(--green)">✓</td></tr>';
      }
    });
    if(csvAttendees.length>8)html+='<tr><td colspan="5" style="color:var(--text-muted)">+ '+(csvAttendees.length-8)+' mais</td></tr>';
    html+='</tbody>';
    tbl.innerHTML=html;
    document.getElementById('csvPreview').classList.remove('hidden');
    document.getElementById('step2Btn').disabled=false;
  };
  if(isXlsx)r.readAsArrayBuffer(file);
  else r.readAsText(file);
}

function parseCSV(text){const rows=[];let row=[],cell='',inQ=false;for(let i=0;i<text.length;i++){const c=text[i];if(inQ){if(c==='"'&&text[i+1]==='"'){cell+='"';i++}else if(c==='"')inQ=false;else cell+=c}else{if(c==='"')inQ=true;else if(c===','){row.push(cell);cell=''}else if(c==='\n'||(c==='\r'&&text[i+1]==='\n')){row.push(cell);cell='';rows.push(row);row=[];if(c==='\r')i++}else cell+=c}}if(cell||row.length){row.push(cell);rows.push(row)}return rows}

// SCANNER
// ═══════════════════════════════════════════
let scannerRunning=false,lastScanTime=0;
function startScanner(){
  populateStandSelectors();
  if(scannerRunning)return;
  const video=document.getElementById('video');
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d',{willReadFrequently:true});
  
  const constraints={video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}};
  
  navigator.mediaDevices.getUserMedia(constraints).then(stream=>{
    video.srcObject=stream;
    video.setAttribute('playsinline','true');
    video.play();
    scannerRunning=true;
    let frameCount=0;
    
    function tick(){
      if(!scannerRunning)return;
      if(video.readyState===video.HAVE_ENOUGH_DATA){
        canvas.width=video.videoWidth;
        canvas.height=video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        
        // Try scanning every 3rd frame for performance
        frameCount++;
        if(frameCount%3===0){
          try{
            const code=jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:'attemptBoth'});
            if(code&&code.data&&code.data.length>3&&Date.now()-lastScanTime>2000){
              lastScanTime=Date.now();
              console.log('QR detected:',code.data);
              processScan(code.data);
            }
          }catch(e){console.error('jsQR error:',e);}
        }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }).catch(err=>{
    console.error('Camera error:',err);
    // Try without facingMode constraint as fallback
    navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
      video.srcObject=stream;video.play();scannerRunning=true;
      function tick2(){if(!scannerRunning)return;if(video.readyState===video.HAVE_ENOUGH_DATA){canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0);const id2=ctx.getImageData(0,0,canvas.width,canvas.height);try{const c2=jsQR(id2.data,id2.width,id2.height,{inversionAttempts:'attemptBoth'});if(c2&&c2.data&&Date.now()-lastScanTime>2000){lastScanTime=Date.now();processScan(c2.data);}}catch(e){}}requestAnimationFrame(tick2);}
      requestAnimationFrame(tick2);
    }).catch(err2=>{
      document.getElementById('scanResult').innerHTML='<div class="scan-result error">Camera error: '+err2.message+'</div>';
    });
  });
}

function processScan(data){
  const stand=document.getElementById('scannerStandSelect').value;
  if(!stand){showScanResult('error',t('select_stand_first'));return;}
  let att=null;
  if(data.startsWith('EVT|')){
    const p=data.split('|');
    if(p.length>=4) att={id:p[1],name:p[2],email:p[3],phone:p[4]||'',company:p[5]||''};
  }else if(data.startsWith('EVT:')){
    const p=data.split(':');if(p.length>=4) att={id:p[1],name:p[2],email:p.slice(3).join(':'),phone:'',company:''};
  }
  if(!att){
    // Try to find in Firebase attendees by email
    const local=attendees.find(a=>a.email===data||a.id===data);
    if(local)att=local;
  }
  if(!att){showScanResult('error',t('unknown_badge'));return;}
  if(scans.some(s=>s.attendeeId===att.id&&s.stand===stand)){showScanResult('duplicate',att.name+' '+t('already_scanned'));return;}
  if(navigator.vibrate)navigator.vibrate(100);
  showScanResult('success','✓ '+att.name+(att.company?' · '+att.company:''));
  showCommentModal(att,stand);
}

  }
  list.innerHTML=pending.map(a=>
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px">'+
    '<div style="min-width:0;flex:1"><span style="color:var(--orange);font-size:12px">⏳ '+t('guest_of')+' '+a.boughtBy+'</span><br><span style="font-size:10px;color:var(--text-muted)">'+a.boughtByEmail+'</span> <span class="mono">'+a.id+'</span></div>'+
    '<button class="btn btn-primary" style="padding:6px 14px;font-size:11px;flex-shrink:0;margin-left:8px" onclick="showCompleteGuestForm(\''+a.id+'\')">'+t('complete_info')+'</button></div>'
  ).join('');
}

function showCompleteGuestForm(id){
  const att=attendees.find(a=>a.id===id);
  if(!att)return;
  const modal=document.getElementById('commentModal');
  modal.className='modal-overlay';
  modal.innerHTML='<div class="modal"><h2>'+t('complete_guest')+'</h2>'+
    '<div class="modal-sub">'+t('guest_of')+' '+att.boughtBy+' ('+att.boughtByEmail+')</div>'+
    '<div style="margin-bottom:10px"><label data-i18n="full_name">'+t('full_name')+'</label><input type="text" id="guestName" placeholder=""></div>'+
    '<div style="margin-bottom:10px"><label>Email</label><input type="email" id="guestEmail" placeholder=""></div>'+
    '<div style="margin-bottom:10px"><label data-i18n="phone">'+t('phone')+'</label><input type="tel" id="guestPhone" placeholder=""></div>'+
    '<div style="margin-bottom:14px"><label>'+t('company_optional')+'</label><input type="text" id="guestCompany" placeholder=""></div>'+
    '<div style="display:flex;gap:6px"><button class="btn btn-success" style="flex:1" onclick="completeGuest(\''+id+'\')">'+t('register_badge')+'</button>'+
    '<button class="btn btn-secondary" onclick="document.getElementById(\'commentModal\').className=\'hidden\'">'+t('cancel')+'</button></div></div>';
}

async function completeGuest(id){
  const name=document.getElementById('guestName').value.trim();
  const email=document.getElementById('guestEmail').value.trim();
  const phone=document.getElementById('guestPhone').value.trim();
  const company=document.getElementById('guestCompany').value.trim();
  if(!name){alert(t('enter_name_email'));return;}
  const att=attendees.find(a=>a.id===id);
  const updated={...att,name,email:email||att.boughtByEmail,phone,company,pending:false,completedAt:new Date().toISOString()};
  delete updated.boughtBy;delete updated.boughtByEmail;delete updated.guestNum;
  await addAttendee(updated);
  // Show badge inside the modal
  const modal=document.getElementById('commentModal');
  modal.innerHTML='<div class="modal" style="text-align:center">'+
    '<div style="color:var(--green);font-weight:700;font-size:16px;margin-bottom:12px">✓ '+t('registered_ok')+'</div>'+
    '<div class="badge-card" style="margin:0 auto;max-width:300px;text-align:center" id="guestBadgeCard">'+
      '<div class="badge-right">'+
        '<div class="badge-top"><img src="data:image/png;base64,'+BADGE_LOGO_DARK+'" alt="" class="badge-logo"><span class="badge-event">'+(eventData?eventData.name:'')+'</span></div>'+
        '<div class="badge-name">'+name+'</div>'+
        (company?'<div class="badge-company">'+company+'</div>':'')+
      '</div>'+
      '<div class="badge-left"><img src="'+makeQrUrl('EVT|'+id+'|'+name+'|'+(email||'')+'|'+(phone||'')+'|'+(company||''))+'" class="qr-img" width="130" height="130"></div>'+
      '<div class="badge-right" style="border:none;padding-top:0">'+
        '<div class="badge-detail">'+(email||'')+'</div>'+
        (phone?'<div class="badge-detail">'+phone+'</div>':'')+
        '<div class="badge-id">'+id+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;justify-content:center;margin-top:16px">'+
      '<button class="btn btn-primary" onclick="printSingleBadgeFromEl(\'guestBadgeCard\')">🖨 '+t('print_badge')+'</button>'+
      '<button class="btn btn-secondary" onclick="document.getElementById(\'commentModal\').className=\'hidden\';renderPendingGuests()">'+t('cancel')+'</button>'+
    '</div></div>';
  // QR generated via img src
}

// MANUAL ENTRY
function toggleManualEntry(){document.getElementById('manualEntryForm').classList.toggle('hidden');}
async function submitManualEntry(){
  const stand=document.getElementById('scannerStandSelect').value;if(!stand){showScanResult('error',t('select_stand_first'));return;}
  const name=document.getElementById('manualName').value.trim(),email=document.getElementById('manualEmail').value.trim(),phone=document.getElementById('manualPhone').value.trim(),company=document.getElementById('manualCompany').value.trim();
  if(!name||!email){showScanResult('error',t('enter_name_email'));return;}
  // Check if exists in Firebase
  let att=attendees.find(a=>a.email.toLowerCase()===email.toLowerCase());
  if(!att){
    const id='W'+Date.now().toString(36)+Math.random().toString(36).substr(2,3);
    att={id,name,email,phone,company,walkin:true,createdAt:new Date().toISOString()};
    await addAttendee(att);
  }
  if(scans.some(s=>s.attendeeId===att.id&&s.stand===stand)){showScanResult('duplicate',att.name+' '+t('already_scanned'));return;}
  showScanResult('success','✓ '+att.name);
  showCommentModal(att,stand);
  ['manualName','manualEmail','manualPhone','manualCompany'].forEach(x=>document.getElementById(x).value='');toggleManualEntry();
}

function printSingleBadge(){printSingleBadgeFromEl('walkinBadgeCard');}
function printSingleBadgeFromEl(elId){
  const badge=document.getElementById(elId);
  if(!badge)return;
  const printWin=window.open('','_blank','width=600,height=800');
  printWin.document.write('<html><head><title>Badge</title>');
  printWin.document.write('<style>');
  printWin.document.write('@page{size:4in 6in;margin:0}');
  printWin.document.write('body{margin:0;padding:0;display:flex;align-items:center;justify-content:center;width:4in;height:6in;font-family:"DM Sans",sans-serif}');
  printWin.document.write('.badge-card{background:#fff;color:#000;width:4in;height:6in;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-top:6px solid #e28a32;box-sizing:border-box;padding:8mm}');
  printWin.document.write('.badge-left{padding:4mm 0}');
  printWin.document.write('.badge-right{padding:2mm 8mm;text-align:center;width:100%}');
  printWin.document.write('.badge-top{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:5mm;padding-bottom:4mm;border-bottom:1px solid #ddd}');
  printWin.document.write('.badge-name{font-size:26pt;font-weight:800;margin-bottom:2mm}');
  printWin.document.write('.badge-company{font-size:14pt;color:#e28a32;font-weight:700;margin-bottom:2mm}');
  printWin.document.write('.badge-detail{font-size:11pt;color:#333}');
  printWin.document.write('.badge-logo{height:10mm}');
  printWin.document.write('.badge-event{font-size:10pt;color:#999;text-transform:uppercase;letter-spacing:.5px}');
  printWin.document.write('.badge-id{font-family:monospace;font-size:9pt;color:#aaa;margin-top:4mm}');
  printWin.document.write('canvas,img{max-width:32mm!important;max-height:32mm!important}');
  printWin.document.write('</style></head><body>');
  printWin.document.write(badge.outerHTML);
  printWin.document.write('</body></html>');
  printWin.document.close();
  setTimeout(()=>{printWin.print();printWin.close();},500);
}
function renderBadges(){const grid=document.getElementById('badgesGrid');grid.innerHTML='';
const printable=attendees.filter(a=>!a.pending);
const pending=attendees.filter(a=>a.pending);
if(!printable.length&&!pending.length){grid.innerHTML='<p style="color:var(--text-dim)">'+t('no_data')+'</p>';return;}
if(pending.length){const msg=document.createElement('p');msg.style.cssText='color:var(--orange);font-size:13px;margin-bottom:14px';msg.textContent='⏳ '+pending.length+' '+t('pending_guests').toLowerCase();grid.appendChild(msg);}
const evName=eventData?eventData.name:'';
printable.forEach(a=>{
  const card=document.createElement('div');card.className='badge-card';
  const qrData='EVT|'+a.id+'|'+a.name+'|'+a.email+'|'+(a.phone||'')+'|'+(a.company||'');

  card.innerHTML=
    '<div class="badge-right">'+
      '<div class="badge-top"><img src="data:image/png;base64,'+BADGE_LOGO_DARK+'" alt="" class="badge-logo"><span class="badge-event">'+evName+'</span></div>'+
      '<div class="badge-name">'+a.name+'</div>'+
      (a.company?'<div class="badge-company">'+a.company+'</div>':'')+
    '</div>'+

function makeQrUrl(data){return 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(data);}

// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
function renderDashboard(){
  populateStandSelectors();
  const fs=document.getElementById('filterStand').value,fq=(document.getElementById('filterSearch').value||'').toLowerCase();
  let filtered=[...scans];if(fs)filtered=filtered.filter(s=>s.stand===fs);if(fq)filtered=filtered.filter(s=>(s.attendeeName||'').toLowerCase().includes(fq)||(s.attendeeEmail||'').toLowerCase().includes(fq));
  const uv=new Set(filtered.map(s=>s.attendeeId)).size,ts=filtered.length,sa=new Set(filtered.map(s=>s.stand)).size,av=uv?(ts/uv).toFixed(1):'0';
  const totalAttendees=attendees.filter(a=>!a.pending).length;
  const convRate=totalAttendees>0?Math.round((uv/totalAttendees)*100):0;
  document.getElementById('statsRow').innerHTML=[
    '<div class="stat-card"><div class="stat-value">'+totalAttendees+'</div><div class="stat-label">'+t('registered')+'</div></div>',
    '<div class="stat-card"><div class="stat-value">'+ts+'</div><div class="stat-label">'+t('total_scans')+'</div></div>',
    '<div class="stat-card"><div class="stat-value">'+uv+'</div><div class="stat-label">'+t('unique_visitors')+'</div></div>',
    '<div class="stat-card"><div class="stat-value">'+sa+'</div><div class="stat-label">'+t('active_stands')+'</div></div>',
    '<div class="stat-card"><div class="stat-value">'+av+'</div><div class="stat-label">'+t('avg_visits')+'</div></div>',
    '<div class="stat-card"><div class="stat-value">'+convRate+'%</div><div class="stat-label">'+t('conversion')+'</div></div>'
  ].join('');

  // Chart
  const sc={};scans.forEach(s=>{sc[s.stand]=(sc[s.stand]||0)+1});const mx=Math.max(...Object.values(sc),1);
  document.getElementById('standChart').innerHTML=Object.entries(sc).sort((a,b)=>b[1]-a[1]).map(([s,c])=>{
    const pct=Math.round((c/mx)*100);
    return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'+
      '<div style="width:140px;font-size:11px;text-align:right;color:var(--text-dim);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+s+'">'+s+'</div>'+
      '<div style="flex:1;height:28px;background:var(--surface-2);border-radius:6px;overflow:hidden;position:relative">'+
        '<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,var(--accent),#c47020);border-radius:6px;transition:width .5s"></div>'+
        '<span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:var(--text)">'+c+'</span>'+
      '</div></div>';
  }).join('')||'<p style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px">'+t('no_data')+'</p>';

  // Table
  document.getElementById('dashboardBody').innerHTML=filtered.map(s=>{
    const cm=(s.tags?s.tags:'')+(s.tags&&s.comments?' · ':'')+(s.comments||'');
    return '<tr><td class="mono">'+new Date(s.timestamp).toLocaleString()+'</td><td><strong>'+s.attendeeName+'</strong></td><td>'+s.attendeeEmail+'</td><td>'+(s.attendeePhone||'—')+'</td><td>'+(s.attendeeCompany||'—')+'</td><td><span style="color:var(--accent)">'+s.stand+'</span></td><td><span class="comment-preview" title="'+cm.replace(/"/g,'&quot;')+'">'+(cm||'—')+'</span></td></tr>';}).join('')||'<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:20px">'+t('no_data')+'</td></tr>';

  // Matrix: visitor × stand
  renderMatrix();
}
function renderMatrix(){
  const visitors={},standSet=new Set();
  scans.forEach(s=>{
    if(!visitors[s.attendeeId])visitors[s.attendeeId]={name:s.attendeeName,email:s.attendeeEmail,company:s.attendeeCompany||'',stands:new Set()};
    visitors[s.attendeeId].stands.add(s.stand);
    standSet.add(s.stand);
  });
  const sl=[...standSet].sort(),tbl=document.getElementById('matrixTable');
  if(!sl.length){tbl.innerHTML='<tr><td style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px">'+t('no_data')+'</td></tr>';return;}
  let h='<thead><tr><th style="min-width:140px">'+t('col_attendee')+'</th>';
  sl.forEach(s=>{h+='<th style="writing-mode:vertical-lr;transform:rotate(180deg);font-size:9px;max-width:30px;padding:8px 4px;text-align:center">'+s+'</th>'});
  h+='<th style="text-align:center;font-size:9px">Total</th></tr></thead><tbody>';
  const sorted=Object.values(visitors).sort((a,b)=>b.stands.size-a.stands.size);
  sorted.forEach(v=>{
    h+='<tr><td style="font-size:11px"><strong>'+v.name+'</strong>'+(v.company?' <span style="color:var(--text-muted);font-size:10px">'+v.company+'</span>':'')+'</td>';
    sl.forEach(s=>{h+='<td style="text-align:center">'+(v.stands.has(s)?'<span style="color:var(--green);font-size:14px">●</span>':'<span style="color:var(--surface-3)">·</span>')+'</td>'});
    h+='<td style="text-align:center;font-weight:700;color:var(--accent)">'+v.stands.size+'</td></tr>';
  });
  tbl.innerHTML=h+'</tbody>';
}
function exportCSV(){if(!scans.length){alert(t('no_scans'));return;}
let csv='Timestamp,ID,Name,Email,Phone,Company,Stand,Tags,Comments\n';scans.forEach(s=>{csv+='"'+s.timestamp+'","'+s.attendeeId+'","'+s.attendeeName+'","'+s.attendeeEmail+'","'+(s.attendeePhone||'')+'","'+(s.attendeeCompany||'')+'","'+s.stand+'","'+(s.tags||'')+'","'+(s.comments||'').replace(/"/g,'""')+'"\n';});
const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='event_scans.csv';a.click();URL.revokeObjectURL(url);}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',async()=>{
  // Set logos
  document.getElementById('navLogo').src='data:image/png;base64,'+NAV_LOGO;
  document.getElementById('newStand').addEventListener('keydown',e=>{if(e.key==='Enter')addStand()});
  
  applyLang();

  const params=new URLSearchParams(window.location.search);
  const urlEventId=params.get('event');

  if(urlEventId){
    // Supplier mode: go straight to scanner
    const fc=params.get('fc');
    if(fc){
      try{
        const config=JSON.parse(decodeURIComponent(fc));
        if(initFirebase(config)){
          const loaded=await loadEvent(urlEventId);
          if(loaded){
            // Save config so supplier can refresh without losing connection
            localStorage.setItem('qh_firebaseConfig',JSON.stringify(config));
            localStorage.setItem('qh_eventId',urlEventId);
            localStorage.setItem('qh_mode',params.get('mode')||'supplier');
            const mode=params.get('mode')||'supplier';
            listenAttendees();listenScans();
            populateStandSelectors();
            if(mode==='checkin'){
              // Check-in mode: show check-in + badges + dashboard
              document.querySelectorAll('[data-i18n-tab]').forEach(tab=>{
                const t=tab.dataset.i18nTab;
                if(t==='setup'||t==='scanner') tab.style.display='none';
              });
              showView('checkin');
            }else{
              // Supplier mode: scanner only
              document.getElementById('tabBar').style.display='none';
              showView('scanner');
            }
          }
        }
      }catch(e){console.error(e);}
    }else{
      // Supplier refresh without URL params - try to reconnect from cache
      const cachedConfig=localStorage.getItem('qh_firebaseConfig');
      const cachedEid=localStorage.getItem('qh_eventId');
      if(cachedConfig&&cachedEid){
        try{
          const config=JSON.parse(cachedConfig);
          if(initFirebase(config)){
            const loaded=await loadEvent(cachedEid);
            if(loaded){
            const cachedMode=localStorage.getItem('qh_mode')||'supplier';
              listenAttendees();listenScans();
              populateStandSelectors();
              if(cachedMode==='checkin'){
                document.querySelectorAll('[data-i18n-tab]').forEach(tab=>{
                  const t3=tab.dataset.i18nTab;
                  if(t3==='setup'||t3==='scanner') tab.style.display='none';
                });
                showView('checkin');
              }else{
                document.getElementById('tabBar').style.display='none';
                showView('scanner');
              }
            }
          }
        }catch(e){console.error(e);}
      }
    }
  }else{
    // Admin mode
    isAdmin=true;
    const savedConfig=localStorage.getItem('qh_firebaseConfig');
    const savedEid=localStorage.getItem('qh_eventId');
    if(savedConfig&&savedEid){
      try{
        const config=JSON.parse(savedConfig);
        if(initFirebase(config)){
          const loaded=await loadEvent(savedEid);
          if(loaded){
            listenAttendees();listenScans();
            stands=eventData.stands||[];
            populateStandSelectors();
            showSetupStep(4);
            renderSetupSummary();
          }
        }
      }catch(e){console.error(e);}
    }
    if(localStorage.getItem('qh_firebaseConfig'))document.getElementById('firebaseConfig').value=localStorage.getItem('qh_firebaseConfig');
    if(localStorage.getItem('qh_eventName'))document.getElementById('eventName').value=localStorage.getItem('qh_eventName');
    if(localStorage.getItem('qh_eventDate'))document.getElementById('eventDate').value=localStorage.getItem('qh_eventDate');
    if(localStorage.getItem('qh_sheetUrl'))document.getElementById('sheetUrl').value=localStorage.getItem('qh_sheetUrl');
  }
  // Restore selected stand
  const ss=localStorage.getItem('selStand');if(ss){const sel=document.getElementById('scannerStandSelect');if(sel){for(const o of sel.options)if(o.value===ss)o.selected=true;}}
});
</script>
